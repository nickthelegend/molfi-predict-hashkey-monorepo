  <style>

    /* ---- root: style via #root, never a class on the composition element ---- */
    #root {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Barlow", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* full-bleed ground rides on a clip layer, NOT on #root */
    #m2-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(120% 120% at 50% 42%, #151016 0%, #0e0e0e 58%, #0b0b0b 100%);
    }
    /* faint purple bloom that ignites at the convergence point */
    #m2-bloom {
      position: absolute;
      left: 50%;
      top: 44%;
      width: 900px;
      height: 900px;
      margin-left: -450px;
      margin-top: -450px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,153,255,0.30) 0%, rgba(154,107,255,0.10) 34%, rgba(14,14,14,0) 66%);
      opacity: 0;
      will-change: transform, opacity;
    }

    /* ---- Scene 1: exposed bet-rows that implode to center ---- */
    #m2-rows {
      position: absolute;
      inset: 0;
    }
    .m2-row {
      position: absolute;
      left: 50%;
      top: 44%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      background: rgba(25, 25, 25, 0.72);
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #ababab;
      white-space: nowrap;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }
    .m2-row .addr { color: #ffffff; }
    .m2-row .dot { color: #717680; }
    .m2-row .side-yes { color: #34d399; font-weight: 700; }
    .m2-row .side-no { color: #f87171; font-weight: 700; }

    /* ---- Scene 2: the molfi mark (badge + drawn M + spark) ---- */
    #m2-mark {
      position: absolute;
      left: 50%;
      top: 44%;
      width: 260px;
      height: 260px;
      margin-left: -130px;
      margin-top: -130px;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }
    #m2-mark img{width:100%;height:100%;object-fit:contain;display:block} #m2-mark svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
    #m2-badge {
      opacity: 0;               /* fill fades in after the badge pops */
      transform-origin: 50% 50%;
    }
    #m2-mstroke {
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #m2-spark {
      fill: #ffffff;
      transform-box: fill-box;       /* origin resolves against the circle's own box */
      transform-origin: center;      /* scale the spark around its own center */
      opacity: 0;
      will-change: transform, opacity;
    }

    /* ---- Scene 3: wordmark + tagline lockup ---- */
    #m2-lock {
      position: absolute;
      left: 0;
      right: 0;
      top: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: 50% 0%;
      will-change: transform;
    }
    #m2-word {
      font-family: "Barlow", sans-serif;
      font-weight: 800;
      font-size: 118px;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #ffffff;
      opacity: 0;
      will-change: transform, opacity;
    }
    #m2-tag {
      margin-top: 24px;
      font-family: "Barlow", sans-serif;
      font-weight: 600;
      font-size: 34px;
      letter-spacing: 0.01em;
      color: #ababab;
      opacity: 0;
      will-change: transform, opacity;
    }
    #m2-tag b {
      color: #c899ff;
      font-weight: 700;
    }
  </style>

  <div id="root" data-composition-id="02-molfi" data-duration="3.797" data-width="1920" data-height="1080">
    <!-- full-bleed ground (lowest track) -->
    <div id="m2-bg" class="clip" data-start="0" data-duration="3.797" data-track-index="0"></div>
    <div id="m2-bloom" class="clip" data-start="0" data-duration="3.797" data-track-index="1"></div>

    <!-- Scene 1 — the exposed rows that rush inward -->
    <div id="m2-rows" class="clip" data-start="0" data-duration="2.2" data-track-index="2">
      <div class="m2-row" data-tx="-560" data-ty="-190" data-rot="-4">
        <span class="addr">0x9f&#8230;a2</span><span class="dot">&#183;</span>BTC&#8593;<span class="dot">&#183;</span><span class="side-yes">YES</span>
      </div>
      <div class="m2-row" data-tx="540" data-ty="-150" data-rot="5">
        <span class="addr">0x71&#8230;e4</span><span class="dot">&#183;</span>ETH&#8595;<span class="dot">&#183;</span><span class="side-no">NO</span>
      </div>
      <div class="m2-row" data-tx="-600" data-ty="70" data-rot="3">
        <span class="addr">0x3c&#8230;9d</span><span class="dot">&#183;</span>SOL&#8593;<span class="dot">&#183;</span><span class="side-yes">YES</span>
      </div>
      <div class="m2-row" data-tx="560" data-ty="120" data-rot="-5">
        <span class="addr">0xa8&#8230;1f</span><span class="dot">&#183;</span>BTC&#8595;<span class="dot">&#183;</span><span class="side-no">NO</span>
      </div>
      <div class="m2-row" data-tx="-250" data-ty="-320" data-rot="6">
        <span class="addr">0xd2&#8230;7b</span><span class="dot">&#183;</span>ETH&#8593;<span class="dot">&#183;</span><span class="side-yes">YES</span>
      </div>
      <div class="m2-row" data-tx="300" data-ty="300" data-rot="-3">
        <span class="addr">0x64&#8230;c0</span><span class="dot">&#183;</span>SOL&#8595;<span class="dot">&#183;</span><span class="side-no">NO</span>

    <!-- Scene 2 — the molfi mark -->
    <div id="m2-mark" class="clip" data-start="1.75" data-duration="2.047" data-track-index="3">
      <img class="m2-logo" src="assets/molfi-logo.png" alt="Molfi" />
    </div>

    <!-- Scene 3 — wordmark + tagline lockup -->
    <div id="m2-lock" class="clip" data-start="2.6" data-duration="1.197" data-track-index="4">
      <div id="m2-word">molfi</div>
      <div id="m2-tag">Private prediction markets on <b>Stellar</b>.</div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      /* ---------- Scene 1 (0.0–~1.8s): rows implode to center ---------- */
      // Each row starts spread at its data-tx/ty (offset from the shared
      // center via xPercent/yPercent -50) and is SUCKED inward — x/y→0,
      // scale→0.14, opacity→0 on a power2.in so they accelerate into the
      // convergence point (center-outward-expansion run INWARD).
      var rows = gsap.utils.toArray("#m2-rows .m2-row");
      var ROW_IMPLODE_DUR = 1.05;
      var ROW_STAGGER = 0.05;
      rows.forEach(function (el, i) {
        var tx = Number(el.dataset.tx);
        var ty = Number(el.dataset.ty);
        var rot = Number(el.dataset.rot);
        tl.fromTo(
          el,
          { xPercent: -50, yPercent: -50, x: tx, y: ty, rotation: rot, scale: 1, opacity: 0 },
          { opacity: 1, duration: 0.28, ease: "power2.out" },
          0.0 + i * ROW_STAGGER
        );
        tl.to(
          el,
          { x: 0, y: 0, rotation: 0, scale: 0.14, opacity: 0, duration: ROW_IMPLODE_DUR, ease: "power2.in" },
          0.55 + i * ROW_STAGGER
        );
      });

      // convergence flash — the bloom ignites as the rows land at center,
      // then eases back to a low ambient glow that carries under the mark.
      tl.fromTo(
        "#m2-bloom",
        { scale: 0.35, opacity: 0 },
        { scale: 1.0, opacity: 0.9, duration: 0.34, ease: "power2.out" },
        1.5
      );
      tl.to("#m2-bloom", { scale: 1.18, opacity: 0.22, duration: 1.0, ease: "power2.out" }, 1.86);

      /* ---------- Scene 2 (~1.75–3.0s): assemble the mark ---------- */
      // Badge pops in (smooth power3 settle — no bounce) right where the
      // rows converged, then the white "M" chart-peaks stroke on, then the
      // spark pops on the rising peak with a glow envelope.
      tl.fromTo(
        "#m2-mark",
        { scale: 0.2, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.62, ease: "power3.out" },
        1.75
      );
      // badge fill fades in just after the pop starts (draw-then-fill feel)
      tl.fromTo(
        "#m2-badge",
        { opacity: 0 },
        { opacity: 1, duration: 0.42, ease: "power1.out" },
        1.9
      );

      // stroke-draw the M: measure the real path length, dash it, draw to 0.
      var mPath = document.querySelector("#m2-mstroke");
      if (mPath && mPath.getTotalLength) {
        var len = mPath.getTotalLength();
        mPath.style.strokeDasharray = String(len);
        mPath.style.strokeDashoffset = String(len);
        tl.to(
          "#m2-mstroke",
          { strokeDashoffset: 0, duration: 0.72, ease: "power2.out" },
          2.16
        );
      }

      // spark pop on the rising peak — scale-in with a short glow envelope
      // driven onUpdate (asr-keyword-glow style, deterministic linear driver).
      tl.fromTo(
        "#m2-spark",
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" },
        2.72
      );
      var sparkEl = document.querySelector("#m2-spark");
      var sparkGlow = { t: 0 };
      var GLOW_START = 2.72;
      var GLOW_DUR = 0.9;
      tl.to(
        sparkGlow,
        {
          t: 1,
          duration: GLOW_DUR,
          ease: "none",
          onUpdate: function () {
            if (!sparkEl) return;
            // attack to peak at ~35% then decay to a low rest glow
            var p = sparkGlow.t;
            var env = p < 0.35 ? (p / 0.35) : (1 - (p - 0.35) / 0.65 * 0.72);
            var blur = 16 * env;
            sparkEl.style.filter =
              "drop-shadow(0 0 " + blur.toFixed(2) + "px rgba(200,153,255," + (0.35 + env * 0.55).toFixed(3) + "))";
          }
        },
        GLOW_START
      );

      /* ---------- Scene 3 (~2.6–3.797s): wordmark + tagline lockup ---------- */
      // wordmark fades up beneath the mark, then the tagline settles.
      tl.fromTo(
        "#m2-word",
        { y: 26, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
        2.62
      );
      tl.fromTo(
        "#m2-tag",
        { y: 18, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
        3.0
      );

      // calm hold: slow ~1.5% scale drift on the whole lockup + mark
      // (no exit — this is not the final frame; the root transition is the exit)
      tl.fromTo(
        "#m2-mark",
        { scale: 1 },
        { scale: 1.015, duration: 1.0, ease: "sine.inOut" },
        2.8
      );
      tl.fromTo(
        "#m2-lock",
        { scale: 1 },
        { scale: 1.015, duration: 1.0, ease: "sine.inOut" },
        2.9
      );

      window.__timelines["02-molfi"] = tl;
    })();
  </script>
