    <style>
      @font-face {
        font-family: "Barlow";

      }

        font-display: block;
      }
      @font-face {
        font-family: "Barlow";
        src: url("assets/fonts/barlow-700.woff2") format("woff2");
        font-weight: 700;
        font-display: block;
      }
      @font-face {
        font-family: "Barlow";
        src: url("assets/fonts/barlow-800.woff2") format("woff2");
        font-weight: 800;
        font-display: block;
      }
      @font-face {

        src: url("assets/fonts/jbmono-400.woff2") format("woff2");

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;

      .bg {

        inset: 0;
        background:
          radial-gradient(1200px 720px at 50% 40%, rgba(200, 153, 255, 0.10), rgba(200, 153, 255, 0) 62%),
          #0e0e0e;
      }
      .bg::after {
        /* faint dot grid */
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.4px, transparent 1.4px);
        background-size: 48px 48px;

      }

      .stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .world {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        transform-origin: 50% 50%;

      }

      /* live grid — anchored slightly high so the whole top-83% is used */

        position: relative;
        display: grid;
        grid-template-columns: repeat(3, 452px);

        /* centering folded into the GSAP tween via xPercent:-50 — no CSS transform here

        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 26px;
        background: rgba(200, 153, 255, 0.10);

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---- Scene 1 (0–3s): 2×3 grid cascades in, staggered assemble ----
      // fromTo so t=0 is the collapsed state under seek; power3.out smooth settle,
      // short slide into slot (low drama), deterministic index-derived stagger.
      const cards = gsap.utils.toArray("#grid .mcard");
      const STAGGER = 0.09;
      cards.forEach((el, i) => {
        tl.fromTo(
          el,
          { opacity: 0, scale: 0.9, y: 34 },
          { opacity: 1, scale: 1, y: 0, duration: 0.62, ease: "power3.out" },
          0.15 + i * STAGGER
        );
      });

      // sentiment bars sweep to their odds width just after each card lands.
      // width is set inline per card; scaleX 0→1 grows the fill to that width.
      const fills = gsap.utils.toArray("#grid .fill");
      fills.forEach((el, i) => {
        tl.fromTo(
          el,
          { scaleX: 0 },
          { scaleX: 1, duration: 0.5, ease: "power2.out", transformOrigin: "0% 50%" },
          0.5 + i * STAGGER
        );
      });

      // ---- Scene 2 (3–5s): pill chip stamps in, bottom-center ----
      // center offset folded into xPercent so GSAP's transform doesn't drop the CSS translateX centering
      tl.fromTo(
        "#chip",
        { opacity: 0, scale: 0.72, xPercent: -50, yPercent: 8 },
        { opacity: 1, scale: 1, xPercent: -50, yPercent: 0, duration: 0.55, ease: "power3.out" },
        3.0
      );

      // ---- Scene 3 (5–6.848s): gentle slow zoom-OUT — "a bigger venue" ----
      // Single-wrapper virtual camera: cam.scale drives world transform via onUpdate.
      const world = document.getElementById("world");
      const cam = { scale: 1 };
      function applyCamera() {
        world.style.transform = "scale(" + cam.scale + ")";
      }
      applyCamera();
      // slow continuous push-back to reveal the ghost ring at the edges
      tl.to(
        cam,
        { scale: 0.86, duration: 2.6, ease: "power1.inOut", onUpdate: applyCamera },
        4.2
      );
      // ghosts fade up as the camera pulls back (they enter frame from outside)
      tl.fromTo(
        "#ghosts .gcard",
        { opacity: 0 },
        { opacity: 0.35, duration: 1.6, ease: "power1.out" },
        4.4
      );

      // NOTE: not the final frame — no exit tween (the root transition is the exit).

      window.__timelines["05-venue"] = tl;
    </script>
