    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        var rows = gsap.utils.toArray("#p1-feed .p1-row");
        var feed = document.getElementById("p1-feed");
        var grid = document.getElementById("p1-grid");
        var vignette = document.getElementById("p1-vignette");

        // ---- Scene 1 (0–2.5s): cold open — eyebrow + rows cascade up ----
        // spring-pop-entrance: fromTo {scale:0,opacity:0} on a smooth power3.out
        // settle (no overshoot). Deterministic index stagger; a small y-rise
        // layers the "lifts into place" onto the scale grow.
        tl.fromTo(
          "#p1-eyebrow",
          { opacity: 0, y: -14 },
          { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
          0.15
        );

        // Rows arrive bottom-first, cascading upward, paced under "public".
        var POP_DUR = 0.62;
        var STAGGER = 0.24; // reveals paced to the VO across Scene 1, not one chord
        rows.forEach(function (el, i) {
          tl.fromTo(
            el,
            { scale: 0.7, opacity: 0, y: 34 },
            { scale: 1, opacity: 1, y: 0, duration: POP_DUR, ease: "power3.out" },
            0.25 + i * STAGGER
          );
        });

        // ---- Scene 2 (2.5–5s): density builds, grid lights, feed drifts up ----
        // The faint grid fades in as the feed accumulates.
        tl.fromTo(
          grid,
          { opacity: 0 },
          { opacity: 1, duration: 1.1, ease: "power2.out" },
          2.4
        );

        // Continuous upward drift of the whole feed — one long tween, no reset.
        // Subtly accelerates (power1.in) so density reads as "building", and the
        // masked ledger dissolves rows at the top edge as they climb.
        tl.fromTo(
          feed,
          { y: 0 },
          { y: -196, duration: 3.4, ease: "power1.in" },
          2.0
        );

        // sine-wave-loop (low-amplitude register): a subtle collective lateral
        // sway on the feed, bounded and finite (no yoyo). It rides on a SEPARATE
        // carrier element (#p1-ledger-mask) so it never fights the GSAP y-drift
        // that owns #p1-feed's transform. sin(0)=0 → starts flush.
        var swayCarrier = document.getElementById("p1-ledger-mask");
        var sway = { p: 0 };
        tl.to(
          sway,
          {
            p: Math.PI * 2 * 2, // 2 gentle cycles across the drift window
            duration: 3.4,
            ease: "none",
            onUpdate: function () {
              var dx = Math.sin(sway.p) * 3; // ±3px lateral — barely perceptible
              swayCarrier.style.transform = "translateX(" + dx + "px)";
            },
          },
          2.0
        );

        // Vignette deepens as the frame closes in (claustrophobia rising).
        tl.fromTo(
          vignette,
          { opacity: 0 },
          { opacity: 1, duration: 2.0, ease: "power2.inOut" },
          3.0
        );

        // ---- Scene 3 (~4.4–end): purple ring snaps around ONE row + "you" tag ----
        // spring-pop-entrance on the ring — a deliberate, modest snap (the one
        // sanctioned overshoot: this IS the "you took" punctuation). Kept ≤2.
        tl.fromTo(
          "#p1-ring",
          { scale: 0.86, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.7)" },
          4.55
        );
        // "you" tag pops just after the ring lands, growing from its right anchor
        // (transform-origin:100% 50%) so it unfurls leftward off the row's corner.
        tl.fromTo(
          "#p1-you",
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.42, ease: "back.out(1.9)" },
          4.78
        );
        // Claustrophobic hold: a single, tiny bounded pulse on the ring so the
        // spotlight stays alive during the freeze — low amplitude, finite,
        // sin(0)=0 so it's flush with the landed scale. No exit (not final frame).
        var ringPulse = { p: 0 };
        tl.to(
          ringPulse,
          {
            p: Math.PI * 2 * 1.5,
            duration: 1.0,
            ease: "none",
            onUpdate: function () {
              var s = 1 + Math.sin(ringPulse.p) * 0.012; // ±1.2% breath
              document.getElementById("p1-ring-inner").style.transform = "scale(" + s + ")";
            },
          },
          5.1
        );

        window.__timelines["01-public"] = tl;
      })();
