      const tl = gsap.timeline({ paused: true });

      // ── BEAT 1 — receded market-grid ghost dims + blurs to near-black ──

      // ── BEAT 2 — "Built for agents." types on (Barlow) w/ blinking caret ──
      // smooth-slice typewriter (discrete-text-sequence variation).
      const FULL = "Built for agents.";
      const headEl = document.getElementById("ag-headline-text");
      const len = { v: 0 };
      // headline block fades up first
      tl.fromTo(
        "#ag-headline-wrap",
        { opacity: 0, y: 26 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
        0.7
      );
      tl.to(
        len,
        {
          v: FULL.length,
          duration: 1.35,
          ease: "none",
          onUpdate: () => { headEl.textContent = FULL.substring(0, Math.floor(len.v)); },
        },
        0.9
      );

      // Headline caret — deterministic sin blink (context-sensitive-cursor).
      // ~1 blink / 0.6s across the 3.652s the caret is on screen.
      const hCaret = document.getElementById("ag-caret");
      const hBlink = { p: 0 };
      tl.to(
        hBlink,
        {
          p: Math.PI * 2 * 6,   // 6 whole cycles → clean end, no last-frame pop
          duration: 3.652,
          ease: "none",
          onUpdate: () => { hCaret.style.opacity = Math.sin(hBlink.p) > 0 ? "1" : "0"; },
        },
        0.7
      );

      // ── BEAT 3 — empty terminal window fades up, caret waiting ──
      tl.fromTo(
        "#ag-terminal",
        { opacity: 0, y: 34, scale: 0.98 },
        { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "power2.out" },
        2.7
      );

      // Terminal caret — deterministic sin blink, waiting for Act 2.
      const tCaret = document.getElementById("ag-term-caret");
      const tBlink = { p: 0 };

        tBlink,

          p: Math.PI * 2 * 3,   // 3 whole cycles over the ~1.65s it's visible
          duration: 1.652,
          ease: "none",
          onUpdate: () => { tCaret.style.opacity = Math.sin(tBlink.p) > 0 ? "1" : "0"; },
