        var TIP_X = 10, TIP_Y = 35;

        // window fade + subtle rise
        tl.fromTo(
          "#f3-window",

          "#f3-bloom",
          { opacity: 0 },
          { opacity: 1, duration: 0.9, ease: "power2.out" },

        tl.to(
          "#f3-line",

          0.6
        );

        // cursor waits off to the lower-left, then holds
        gsap.set("#f3-cursor", { x: 980, y: 720, autoAlpha: 0 });
        tl.to("#f3-cursor", { autoAlpha: 1, duration: 0.3, ease: "power1.out" }, 1.9);

        /* ---------- SCENE 2 (2.5–5s): pick YES, then flip Private ---------- */

        tl.to(

        // tab indicator slides from Standard → Private (255+6 gap ≈ 261)
