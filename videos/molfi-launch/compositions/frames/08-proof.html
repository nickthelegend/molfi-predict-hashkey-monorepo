    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        // ---- Scene 1 (0–~1.9s): hero "+96 mUSDC" counts up big, centered ----

        var glow = document.getElementById("p8-glow");

            value: 96,

            duration: 1.55,
            ease: "power3.out",
            onUpdate: function () {
              num.textContent = "+" + Math.round(state.value);

            },
          },
          0.06
        );

        // Green corner-glow blooms in under the number (ambient, un-triggered).
        tl.fromTo(
          glow,
          { opacity: 0 },
          { opacity: 1, duration: 1.1, ease: "power2.out" },
          0.06
        );

        // Suffix "mUSDC" slides up AFTER the count lands — its own small beat.
        tl.fromTo(
          "#p8-suffix",
          { opacity: 0, y: 26 },
