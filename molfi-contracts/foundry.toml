[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
remappings = ["forge-std/=lib/forge-std/src/"]
fs_permissions = [{ access = "read-write", path = "./deployments" }, { access = "read", path = "./" }, { access = "read", path = "../molfi-circuits" }]

[rpc_endpoints]
hsk_testnet = "https://testnet.hsk.xyz"
hsk_mainnet = "https://mainnet.hsk.xyz"

[etherscan]
hsk_testnet = { key = "any", url = "https://testnet-explorer.hsk.xyz/api" }
hsk_mainnet = { key = "any", url = "https://hashkey.blockscout.com/api" }
